  </head>
  <body class="bg-[#edf1f7]">
    <div id="root"></div>
    <script>
      (function(){
        try{
          var p=new URLSearchParams(window.location.search);
          var c=p.get('checkout');
          var s=p.get('session_id');
          var pl=p.get('plan');
          if(c==='success'&&s){
            localStorage.setItem('vigilink-checkout-return',JSON.stringify({status:'success',sessionId:s,plan:pl||'pro',ts:Date.now()}));
          }else if(c==='cancel'){
            localStorage.setItem('vigilink-checkout-return',JSON.stringify({status:'cancelled',ts:Date.now()}));
          }
          var action=p.get('action');
          if(action){
            localStorage.setItem('vigilink-pending-action',JSON.stringify({action:action,ts:Date.now()}));
          }
          if(window.location.hash==='#sos'){
            localStorage.setItem('vigilink-pending-action',JSON.stringify({action:'sos',ts:Date.now()}));
          }
        }catch(e){}
        if('serviceWorker' in navigator){navigator.serviceWorker.addEventListener('message',function(e){if(e.data&&e.data.type==='SW_UPDATED'){window.location.reload();}});}
      })();
    </script>
  </body>
</html>
